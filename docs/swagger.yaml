      tags:
      - proxy
  /v1/images/generations:
    post:
      consumes:
      - application/json
      description: Generate images from text (DALL-E)
      parameters:
      - description: Image generation request
        in: body
        name: request
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Image generation response
          schema:
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
      security:
      - VirtualKeyAuth: []
      summary: Generate images
      tags:
      - proxy
  /v1/models:
    get:
      consumes:
      - application/json
      description: List available models
      produces:
      - application/json
      responses:
        "200":
          description: Models list" example({"object":"list","data":[{{"id":"gpt-3.5-turbo","object":"model","created":1234567890,"owned_by":"openai","permission":[],"root":"gpt-3.5-turbo","parent":null}},{{"id":"gpt-4","object":"model","created":1234567890,"owned_by":"openai","permission":[],"root":"gpt-4","parent":null}}]})
          schema:
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
      security:
      - VirtualKeyAuth: []
      summary: List models
      tags:
      - proxy
  /v1/proxy/{path}:
    post:
      consumes:
      - application/json
      description: Proxy any request to upstream provider
      parameters:
      - description: Upstream path
        in: path
        name: path
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Proxy response
          schema:
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
      security:
      - VirtualKeyAuth: []
      summary: Proxy request
      tags:
      - proxy
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
  VirtualKeyAuth:
    description: Virtual key for API access
    in: header
    name: x-llm-gateway-api-key
    type: apiKey
swagger: "2.0"
