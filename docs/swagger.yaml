        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Streaming response
          schema:
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
      security:
      - VirtualKeyAuth: []
      summary: Stream chat completion
      tags:
      - proxy
  /v1/completions:
    post:
      consumes:
      - application/json
      description: Create a text completion (legacy)
      parameters:
      - description: Completion request
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Completion response
          schema:
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
      security:
      - VirtualKeyAuth: []
      summary: Text completion
      tags:
      - proxy
  /v1/embeddings:
    post:
      consumes:
      - application/json
      description: Create embeddings for text
      parameters:
      - description: Embedding request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/types.EmbeddingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Embedding response
          schema:
            type: object
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/types.ErrorResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/types.ErrorResponse'
      security:
      - VirtualKeyAuth: []
