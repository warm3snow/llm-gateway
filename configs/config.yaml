cache:
    enabled: false
    type: memory
    defaultTTL: 5m0s
    redis:
        addr: localhost:6379
        password: ""
        db: 0
gateway:
    defaultProvider: ollama
    providers:
        deepseek:
            provider: deepseek
            apiKey: admin123
            weight: 1
            customHost: https://api.deepseek.com/v1
            requestTimeout: 30000
        ollama:
            provider: ollama
            apiKey: o1lama
            customHost: http://localhost:11434/v1
            requestTimeout: 30000
    guardrailsEnabled: true
    maxRequestTimeout: 120000
    supportedProviders:
        - ollama
logging:
    level: info
    format: json
    outputPath: stdout
security:
    apiKeyHeader: x-llm-gateway-api-key
    allowedOrigins:
        - '*'
    rateLimitEnabled: false
    rateLimit: 100
    adminUser: admin
    adminPass: admin123
    jwtSecret: llm-gateway-secret-change-in-production
server:
    host: 0.0.0.0
    port: 8080
    readTimeout: 1m0s
    writeTimeout: 1m0s
    shutdownTimeout: 30s
    mode: debug
