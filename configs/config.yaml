cache:
    enabled: false
    type: memory
    defaultTTL: 5m0s
    redis:
        addr: localhost:6379
        password: ""
        db: 0
gateway:
    defaultProvider: openai
    providers:
        anthropic:
            provider: anthropic
            apiKey: ${ANTHROPIC_API_KEY}
            customHost: https://api.anthropic.com/v1
        google:
            provider: google
            apiKey: ${GOOGLE_API_KEY}
            customHost: https://generativelanguage.googleapis.com/v1
        groq:
            provider: groq
            apiKey: ${GROQ_API_KEY}
            customHost: https://api.groq.com/openai/v1
        ollama:
            provider: ollama
            apiKey: o1lama
            customHost: http://localhost:11434/v1
        openai:
            provider: openai
            apiKey: ${OPENAI_API_KEY}
        test-provider-1783153058-1:
            provider: openai
            apiKey: sk-test-1783153058-1
            weight: 2
            requestTimeout: 30
    defaultConfig: null
    guardrailsEnabled: true
    maxRequestTimeout: 120000
    supportedProviders:
        - ollama
logging:
    level: info
    format: json
    outputPath: stdout
security:
    apiKeyHeader: x-llm-gateway-api-key
    allowedOrigins:
        - '*'
    rateLimitEnabled: false
    rateLimit: 100
    adminUser: admin
    adminPass: admin123
    jwtSecret: llm-gateway-secret-change-in-production
server:
    host: 0.0.0.0
    port: 8080
    readTimeout: 1m0s
    writeTimeout: 1m0s
    shutdownTimeout: 30s
    mode: debug
